name: Generate Stakbrons Golf Feed

on:
  schedule:
    # Flera körningar per dag så feeden hålls färsk MEDAN rundorna spelas.
    # Tidigare kördes bara 06:00 UTC → en runda som teear av på eftermiddagen
    # syntes inte i feeden förrän nästa morgon. Nu täcker vi hela spelfönstret
    # för både europeiska (förmiddag-eftermiddag svensk tid) och nordamerikanska
    # (eftermiddag-kväll svensk tid) rundor.
    #
    # OBS reliability: GitHubs schemalagda runs dröjer/droppas regelbundet vid
    # toppen av timmen (':00' är mest belastat). Vi lägger därför körningarna på
    # off-peak-minuter och lägger till en TIDIG morgonkörning som redundans, så
    # att morgonrapporten har två chanser att trigga. Kombinerat med -24h-
    # försprånget i round_from_date (R1 genereras redan dygnet före start) är
    # feeden robust mot enstaka missade körningar.
    - cron: '39 5 * * *'   # 07:39 svensk — tidig morgon (redundans för morgonrapporten)
    - cron: '9 6 * * *'    # 08:09 svensk — morgon: previews + gårdagens slutresultat
    - cron: '9 12 * * *'   # 14:09 svensk — europeiska rundor igång
    - cron: '9 15 * * *'   # 17:09 svensk — NA-rundor igång, europeiska klara
    - cron: '9 18 * * *'   # 20:09 svensk — NA mitt i, europeiska slut
    - cron: '9 21 * * *'   # 23:09 svensk — NA-rundor klara
  workflow_dispatch: {}   # manuell trigger från GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Generera reports.json
        env:
          # Valfri. Sätt repo-secret ANTHROPIC_API_KEY för LLM-genererade rubriker + reportage.
          # Settings → Secrets and variables → Actions → New repository secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Valfri. Sätt repo-secret DATAGOLF_API_KEY för rank-baseline i edge-modellen.
          # Gratis nyckel från https://datagolf.com/api-access (sign up + Free tier).
          # Utan nyckel kör edge-modellen ändå, fast med svagare baseline för spelare
          # som inte har tävlingsdata än.
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
        run: python3 scripts/generate.py

      - name: Commit & push om något ändrats
        run: |
          set -e
          git config user.name  "Stakbrons Feed Bot"
          git config user.email "feed-bot@stakbrons.local"

          # Retry-loop: hanterar concurrent push-konflikter. När remote har
          # ändrats sedan vi checked out (t.ex. manuell push), syncar vi
          # mot färsk remote, regenererar feeden mot senaste data, och
          # försöker igen. Detta är säkert eftersom feeden alltid är ren
          # output från ESPN + Kambi — inga lokala ändringar att förlora.
          for attempt in 1 2 3; do
            git add data/reports.json data/history/
            if git diff --staged --quiet; then
              echo "Inga ändringar — hoppar över push"
              exit 0
            fi
            git commit -m "feed: $(date -u +'%Y-%m-%d %H:%M UTC') auto-uppdatering"

            if git push; then
              echo "Push lyckades på försök $attempt"
              exit 0
            fi

            echo "::warning::Push rejected, syncar mot remote (försök $attempt/3)"
            git reset --soft HEAD~1            # behåll filerna i index
            git reset                           # rensa index
            git fetch origin
            git reset --hard origin/main        # rensa lokala ändringar
            python3 scripts/generate.py         # regenerera mot färsk remote
          done

          echo "::error::Push misslyckades efter 3 försök"
          exit 1
