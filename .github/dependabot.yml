# Dependabot — automatiska PR:s när nya versioner av GitHub Actions släpps.
# Open PR för granskning; merga = action uppdateras.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Stockholm"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "github-actions"
